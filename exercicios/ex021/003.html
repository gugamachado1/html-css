<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <style>
        /*Configurações Gerais*/
        body {
            font-family: Arial, Helvetica, sans-serif;
            width: 50%;
            margin: auto;
        }

        header, main, section, aside, article, footer, nav {
            border: 3px solid black;
            padding: 10px;
        }

        header, article, aside, section {
            margin: 10px;
        }

        /*Header*/
        nav {
            text-align: center;
        }

        header > h2 {
            margin: 5px;
        }

        /*Main*/
        main {
            margin: 10px;
            text-align: center;
        }

        main > div {
            display: flex;
        }

        div > section {
            width: 70%;
        }

        div > aside#principal {
            width: 30%
        }

        article#sa {
            display: flex;
            padding: 0px
        }

        div#article {
            text-align: center;
            padding: 10px;
            margin: 10px 0px;
            width: 60%;
        }

        aside#article {
            width: 40%;
        }

        /*Footer*/
        footer {
            margin: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h2>header</h2>
        <nav>
            <h2>nav</h2>
        </nav>
    </header>
    <main>
        <h2>main</h2>
        <div>
            <section>
                <h2>section</h2>
                <article>
                    <h2>article</h2>
                </article>
                <article id="sa">
                    <div id="article">
                        <h2>article</h2>
                    </div>
                    <aside id="article">
                        <h2>aside</h2>
                    </aside>
                </article>
            </section>
            <aside id="principal">
                <h2>aside</h2>
            </aside>
        </div>
    </main>
    <footer>
            <h2>footer</h2>
    </footer>
</body>
</html>
