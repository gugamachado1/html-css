<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
</head>
<body>
    <form action="#" method="get">
        <fieldset>
            <legend>
                Sexo
            </legend>
            <p>
                <input type="radio" name="sexo" id="imasc" checked> <label for="imasc">Masculino</label>

                <br>

                <input type="radio" name="sexo" id="ifem"> <label for="ifem">Feminino</label>
            </p>
        </fieldset>
        <fieldset>
            <legend>
                Esportes Favoritos
            </legend>
            <p>
                <input type="checkbox" name="esfut" id="iesfut" checked> <label for="iesfut">Futebol</label> <br>

                <input type="checkbox" name="esbal" id="iesbal"> <label for="iesbal">Basquete</label> <br>

                <input type="checkbox" name="esvol" id="iesvol"> <label for="iesvol">Vôlei</label> <br>

                <input type="checkbox" name="esten" id="iesten"> <label for="iesten">Tênis</label>
            </p>
        </fieldset>
        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
</body>
</html>
